services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      CORS_ORIGINS: "*"
    depends_on:
      - mongo

  seed:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - mongo
    command: sh -c "sleep 3 && node dist/seed.js"
    profiles:
      - seed

volumes:
  mongo_data:
