apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: omomobubbletea
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '10'
        run.googleapis.com/startup-cpu-boost: 'true'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: IMAGE_PLACEHOLDER
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: MONGODB_URI
              value: REPLACE_WITH_ATLAS_URI
            - name: JWT_SECRET
              value: REPLACE_WITH_STRONG_SECRET
            - name: CORS_ORIGINS
              value: '*'
          resources:
            limits:
              cpu: '1'
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            periodSeconds: 30
